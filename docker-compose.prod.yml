version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_network

  bot:
    build: .
    command: python -m bot.main
    env_file:
      - .env
    depends_on:
      - db
    volumes:
      - uploads:/app/uploads
    networks:
      - app_network

  web:
    build: .
    command: uvicorn web_admin.main:app --host 0.0.0.0 --port 8000
    env_file:
      - .env
    depends_on:
      - db
    volumes:
      - uploads:/app/uploads
    networks:
      - app_network

  scheduler:
    build: .
    command: python -m scheduler.runner
    env_file:
      - .env
    depends_on:
      - db
    networks:
      - app_network

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ./ssl:/etc/letsencrypt
    depends_on:
      - web
    networks:
      - app_network

networks:
  app_network:
    driver: bridge

volumes:
  postgres_data:
  uploads: