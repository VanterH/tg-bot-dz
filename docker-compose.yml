version: '3.8'

services:
  db:
    image: postgres:15
    container_name: doterra_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: doterra_bot
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - doterra_network

  bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    container_name: doterra_bot
    restart: always
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      - ADMIN_TELEGRAM_ID=${ADMIN_TELEGRAM_ID}
      - EXPERT_TELEGRAM_IDS=${EXPERT_TELEGRAM_IDS}
      - DATABASE_URL=postgresql://postgres:${DB_PASSWORD}@db:5432/doterra_bot
      - YANDEX_FOLDER_ID=${YANDEX_FOLDER_ID}
      - YANDEX_API_KEY=${YANDEX_API_KEY}
      - YANDEX_MODEL=${YANDEX_MODEL}
      - RAG_MOCK_MODE=${RAG_MOCK_MODE}
      - RAG_TOP_K=${RAG_TOP_K}
      - RAG_CONFIDENCE_THRESHOLD=${RAG_CONFIDENCE_THRESHOLD}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads
    networks:
      - doterra_network
    command: python -m bot.main

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: doterra_web
    restart: always
    environment:
      - DATABASE_URL=postgresql://postgres:${DB_PASSWORD}@db:5432/doterra_bot
      - SECRET_KEY=${SECRET_KEY}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads
    networks:
      - doterra_network
    command: uvicorn web_admin.simple_app:app --host 0.0.0.0 --port 8000

  nginx:
    image: nginx:alpine
    container_name: doterra_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - web
    networks:
      - doterra_network

networks:
  doterra_network:
    driver: bridge

volumes:
  postgres_data: