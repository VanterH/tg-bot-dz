<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <nav class="col-md-2 d-md-block bg-dark sidebar" style="min-height: 100vh;">
                <div class="position-sticky pt-3">
                    <ul class="nav flex-column">
                        <li class="nav-item">
                            <a class="nav-link text-white" href="/admin/dashboard">Дашборд</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link text-white" href="/admin/bookings">Заявки</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link text-white" href="/admin/schedule">Расписание</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link text-white" href="/admin/clients">Клиенты</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link text-white" href="/admin/reports">Отчёты</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link text-white" href="/admin/settings">Настройки</a>
                        </li>
                        <li class="nav-item mt-5">
                            <a class="nav-link text-danger" href="/admin/logout">Выход</a>
                        </li>
                    </ul>
                </div>
            </nav>

            <main class="col-md-10 ms-sm-auto px-md-4">
                <div class="pt-3 pb-2 mb-3 border-bottom">
                    <h1 class="h2">{% block page_title %}{% endblock %}</h1>
                </div>
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
