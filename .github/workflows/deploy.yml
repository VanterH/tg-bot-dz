name: Deploy to registry (Production)

on:
  push:
    branches: ["main"]
  workflow_dispatch:  # возможность ручного запуска

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Registry
        uses: docker/login-action@v3
        with:
          registry: aroma-images.registry.twcstorage.ru
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push Bot image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.bot
          push: true
          tags: |
            aroma-images.registry.twcstorage.ru/doterra-bot:latest
            aroma-images.registry.twcstorage.ru/doterra-bot:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.web
          push: true
          tags: |
            aroma-images.registry.twcstorage.ru/doterra-web:latest
            aroma-images.registry.twcstorage.ru/doterra-web:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
